  # --------------------------------------------------------------------------
  # User Functions
  # --------------------------------------------------------------------------
  CreateUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/user/
      Handler: create_user.lambda_handler
      Environment:
