  # --------------------------------------------------------------------------
  # Google OAuth Functions
  # --------------------------------------------------------------------------
  GoogleAuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/google_auth/
      Handler: auth_handler.lambda_handler
      Environment:
        Variables:
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
          GOOGLE_CLIENT_SECRET: !Ref GoogleClientSecret
          GOOGLE_REDIRECT_URI: !Ref GoogleRedirectUri
      Layers:
        - !Ref DependenciesLayer
      Events:
        GoogleAuth:
          Type: Api
          Properties:
            Path: /auth/google
            Method: get

  GoogleAuthCallbackFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/google_auth/
      Handler: callback_handler.lambda_handler
      Environment:
        Variables:
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
          GOOGLE_CLIENT_SECRET: !Ref GoogleClientSecret
          GOOGLE_REDIRECT_URI: !Ref GoogleRedirectUri
          FRONTEND_AUTH_SUCCESS_URI: !Ref FrontendAuthSuccessUri
          USER_TABLE: !Ref UserTable
      Layers:
        - !Ref DependenciesLayer
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UserTable
      Events:
        GoogleAuthCallback:
          Type: Api
          Properties:
            Path: /auth/callback
            Method: get

  # --------------------------------------------------------------------------
  # Google Calendar Import Function
  # --------------------------------------------------------------------------
  ImportGoogleCalendarFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/google_calendar/
      Handler: import_calendar.lambda_handler
      Environment:
        Variables:
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
          GOOGLE_CLIENT_SECRET: !Ref GoogleClientSecret
          USER_TABLE: !Ref UserTable
          EVENT_TABLE: !Ref EventTable
      Layers:
        - !Ref DependenciesLayer
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UserTable
        - DynamoDBCrudPolicy:
            TableName: !Ref EventTable
      Events:
        ImportGoogleCalendar:
          Type: Api
          Properties:
            Path: /user/{user_id}/board/{board_id}/import-calendar
            Method: post

# ============================================================================
# OUTPUTS
# ============================================================================
Outputs:
  ApiEndpoint:
    Description: 'API Gateway endpoint URL for Prod stage'
    Value: !Sub 'https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/'

  EventTableName:
    Description: 'DynamoDB table name for event'
    Value: !Ref EventTable

  CreateEventFunctionArn:
    Description: 'Create Event Lambda Function ARN'
    Value: !GetAtt CreateEventFunction.Arn

  UserTableName:
    Description: 'DynamoDB table name for user'
    Value: !Ref UserTable
