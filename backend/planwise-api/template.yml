            Method: delete
  
  GetTagsByUser:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/tag/
      Handler: get_tags_by_user.lambda_handler
      Environment:
        Variables:
          BOARD_TABLE: !Ref TagTable
      Layers:
        - !Ref DependenciesLayer
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TagTable
      Events:
        DeleteEvent:
          Type: Api
          Properties:
