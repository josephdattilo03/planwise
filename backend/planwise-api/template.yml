AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  planwise-api
  SAM Template for Event Management API

# ============================================================================
# PARAMETERS
# ============================================================================
Parameters:
  DynamoDBEndpoint:
    Type: String
    Default: 'http://host.docker.internal:8000'
    Description: 'DynamoDB endpoint URL for local development (leave empty for AWS)'
  GoogleClientId:
    Type: String
    Default: ''
    Description: 'Google OAuth client ID'
  GoogleClientSecret:
    Type: String
    NoEcho: true
    Default: ''
    Description: 'Google OAuth client secret'
  GoogleRedirectUri:
    Type: String
    Default: 'http://localhost:3001/auth/callback'
    Description: 'Google OAuth callback URL handled by this API (SAM local default port; must match Google Cloud if using /auth/google)'
  FrontendAuthSuccessUri:
    Type: String
    Default: 'http://localhost:3000/auth/success'
    Description: 'Frontend URL to redirect to after OAuth success'

# ============================================================================
# GLOBALS
# ============================================================================
Globals:
  Function:
    Runtime: python3.13
    Architectures:
      - arm64
    Timeout: 30
    Environment:
      Variables:
        DYNAMODB_URL: !Ref DynamoDBEndpoint
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
      AllowOrigin: "'*'"

# ============================================================================
# RESOURCES
# ============================================================================
Resources:
  # --------------------------------------------------------------------------
  # Lambda Layers
  # --------------------------------------------------------------------------
  DependenciesLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: planwise-api-dependencies
      Description: Shared dependencies including Pydantic and models
      ContentUri: layers/dependencies
      CompatibleRuntimes:
        - python3.13
      CompatibleArchitectures:
        - arm64
      RetentionPolicy: Delete
    Metadata:
      BuildMethod: python3.13
      BuildArchitecture: arm64

  # --------------------------------------------------------------------------
  # DynamoDB Tables
  # --------------------------------------------------------------------------
  EventTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: event-table
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  FolderTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: folder-table
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  BoardTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: board-table
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  TagTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: tag-table
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  TaskTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: task-table
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
          Projection:
            ProjectionType: ALL


  NoteTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: note-table
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  UserTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: user-table
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  # --------------------------------------------------------------------------
  # Event Functions
  # --------------------------------------------------------------------------
  CreateEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/event/
      Handler: create_event.lambda_handler
      Environment:
        Variables:
          EVENT_TABLE: !Ref EventTable
      Layers:
        - !Ref DependenciesLayer
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventTable
      Events:
        CreateEvent:
          Type: Api
          Properties:
            Path: /board/event
            Method: post

  GetEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/event/
      Handler: get_event.lambda_handler
      Environment:
        Variables:
          EVENT_TABLE: !Ref EventTable
      Layers:
        - !Ref DependenciesLayer
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EventTable
      Events:
        GetEvent:
          Type: Api
          Properties:
            Path: /board/{board_id}/event/{id}
            Method: get

  GetEventsByBoardFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/event/
      Handler: get_events_by_board.lambda_handler
      Environment:
        Variables:
          EVENT_TABLE: !Ref EventTable
      Layers:
        - !Ref DependenciesLayer
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EventTable
      Events:
        GetEvent:
          Type: Api
          Properties:
            Path: /board/{board_id}/event/
            Method: get

  UpdateEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/event/
      Handler: update_event.lambda_handler
      Environment:
        Variables:
          EVENT_TABLE: !Ref EventTable
      Layers:
        - !Ref DependenciesLayer
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventTable
      Events:
        UpdateEvent:
          Type: Api
          Properties:
            Path: /board/{board_id}/event/{id}
            Method: put

  DeleteEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/event/
      Handler: delete_event.lambda_handler
      Environment:
        Variables:
          EVENT_TABLE: !Ref EventTable
      Layers:
        - !Ref DependenciesLayer
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventTable
      Events:
        DeleteEvent:
          Type: Api
          Properties:
            Path: /board/{board_id}/event/{id}
            Method: delete
