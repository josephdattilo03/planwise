  DeleteFolderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/folder/
      Handler: delete_folder.lambda_handler
      Environment:
        Variables:
          FOLDER_TABLE: !Ref FolderTable
      Layers:
        - !Ref DependenciesLayer
      Policies:
